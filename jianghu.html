<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <style>
        /* 样式与之前相同，此处省略保持简洁，实际使用时复制原版样式 */
        * { box-sizing: border-box; user-select: none; }
        body { background: linear-gradient(145deg, #1a2a1f 0%, #0f1a0e 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', '华文楷书', monospace; padding: 20px; margin: 0; }
        .game-container { max-width: 700px; width: 100%; background: #fef3d6; border-radius: 48px 32px 56px 32px; box-shadow: 0 25px 45px rgba(0,0,0,0.5); overflow: hidden; border: 1px solid #dac292; }
        .game-header { background: #3e2a1f; padding: 16px 20px; text-align: center; border-bottom: 3px solid #e9bc7d; }
        .game-header h1 { margin: 0; font-size: 1.8rem; color: #ffefb9; text-shadow: 2px 2px 0 #5a3a22; }
        .stats-panel { background: #2c2418e0; display: flex; justify-content: space-between; padding: 10px 24px; color: #ffefcf; }
        .stat { background: #1f1912; padding: 4px 14px; border-radius: 40px; }
        .story-area { min-height: 280px; padding: 24px 28px; background: #fff8ec; margin: 18px 20px; border-radius: 38px; font-size: 1.08rem; line-height: 1.55; color: #2e241b; }
        .choices-area { padding: 8px 20px 28px 20px; display: flex; flex-direction: column; gap: 12px; }
        .choice-btn { background: #2e2a22; border: none; padding: 12px 20px; border-radius: 60px; color: #fceeca; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .reset-btn { display: block; width: calc(100% - 40px); margin: 8px auto 24px; background: #735e3d; border: none; padding: 10px; border-radius: 40px; color: #fcf0cf; cursor: pointer; }
        footer { font-size: 0.7rem; text-align: center; background: #1f1b14; color: #ad9a72; padding: 10px; }
        .prefix { background: #d6a15a; width: 32px; height: 32px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: #231f18; }
    </style>
</head>

        <p>│ 扩展版 · 百万文本库 │ 动态江湖 无限可能 │</p>
    </div>
    <div class="stats-panel">

    <div class="story-area">

    <div class="choices-area" id="choicesContainer"></div>

    <footer>⚡ 动态文本库 | 每次选择都可能遇见不同描述</footer>
</div>

    function clamp(v, min, max) { return Math.min(max, Math.max(min, v)); }
    function updateStatsUI() { document.getElementById("valorValue").innerText = gameState.valor; document.getElementById("wuValue").innerText = gameState.wu; }
    
    function applyNode(nodeId) {
        const node = nodes[nodeId];
        if (!node) { renderToStart(); return; }
        document.getElementById("storyText").innerHTML = node.desc.replace(/\n/g,'<br>');
        const container = document.getElementById("choicesContainer");
        container.innerHTML = "";
        for (let i = 0; i < node.choices.length; i++) {
            const ch = node.choices[i];
            const btn = document.createElement("button");
            btn.className = "choice-btn";
            const prefix = document.createElement("span");
            prefix.className = "prefix";
            prefix.innerText = String.fromCharCode(65+i);
            const textSpan = document.createElement("span");
            textSpan.innerText = ch.text;
            btn.appendChild(prefix); btn.appendChild(textSpan);
            btn.addEventListener("click", () => {
                gameState.valor = clamp(gameState.valor + (ch.valorDelta || 0), 0, 100);
                gameState.wu = clamp(gameState.wu + (ch.wuDelta || 0), 0, 100);
                updateStatsUI();
                if (nodes[ch.next]) { gameState.stageId = ch.next; applyNode(ch.next); }
                else { renderToStart(); }
            });
            container.appendChild(btn);
        }
        gameState.stageId = nodeId;
    }
    
    function renderToStart() { gameState.valor = 50; gameState.wu = 50; gameState.stageId = "start"; updateStatsUI(); applyNode("start"); }
    document.getElementById("resetGameBtn").addEventListener("click", renderToStart);
    renderToStart();
</script>
</body>
</html>
