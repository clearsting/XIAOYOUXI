<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>燕云十六声 · 双生江湖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f0a 0%, #1a2015 100%);
            font-family: 'Segoe UI', '华文楷书', 'Microsoft YaHei', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .hall-container {
            max-width: 1100px;
            width: 100%;
        }

        /* 标题区 */
        .title-area {
            text-align: center;
            margin-bottom: 48px;
        }

        .title-area h1 {
            font-size: 3rem;
            color: #e8c68a;
            text-shadow: 4px 4px 0 #3a2a1a;
            letter-spacing: 8px;
        }

        .title-area p {
            color: #b89a6a;
            font-size: 1rem;
            margin-top: 12px;
            font-style: italic;
        }

        /* 双卡牌布局 */
        .game-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 32px;
            justify-content: center;
        }

        .card {
            flex: 1;
            min-width: 280px;
            background: #1e1b16e6;
            backdrop-filter: blur(4px);
            border-radius: 48px 24px 56px 24px;
            padding: 28px 24px 36px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid #c9aa6f;
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.5);
        }

        .card:hover {
            transform: translateY(-10px);
            background: #2a241ce6;
            border-color: #ecc281;
            box-shadow: 0 30px 40px -12px black;
        }

        .card-icon {
            font-size: 5rem;
            margin-bottom: 16px;
        }

        .card h2 {
            font-size: 2rem;
            color: #f3d99b;
            margin-bottom: 12px;
        }

        .card .sub {
            color: #c6a66d;
            font-size: 0.85rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .card .desc {
            color: #dfcca8;
            line-height: 1.6;
            margin-bottom: 28px;
            font-size: 0.95rem;
        }

        .card-btn {
            display: inline-block;
            background: #7a5a3a;
            padding: 10px 28px;
            border-radius: 40px;
            color: #fff0cf;
            font-weight: bold;
            text-decoration: none;
            transition: 0.2s;
            border: 1px solid #e7bc78;
        }

        .card-btn:hover {
            background: #9b784e;
            color: white;
        }

        /* 脚注 */
        .footer-note {
            text-align: center;
            margin-top: 56px;
            color: #7e6a48;
            font-size: 0.8rem;
        }

        @media (max-width: 700px) {
            .title-area h1 { font-size: 2rem; letter-spacing: 4px; }
            .card { min-width: 260px; }
        }
    </style>
</head>
<body>
<div class="hall-container">
    <div class="title-area">
        <h1>燕云十六声</h1>
        <p>双生江湖 · 一念侠客 一念修罗</p>
    </div>
    <div class="game-cards">
        <!-- 江湖行 · 剧情冒险 -->
        <div class="card" onclick="location.href='jianghu.html'">
            <div class="card-icon">📜</div>
            <h2>江湖行</h2>
            <div class="sub">· 剧情冒险 ·</div>
            <div class="desc">
                多线叙事，命运由心。<br>
                侠义值 × 武学悟性，十几种结局。<br>
                体验沉浸式武侠人生。
            </div>
            <span class="card-btn">踏入江湖 →</span>
        </div>

        <!-- 百战燕云 · Roguelike地牢 -->
        <div class="card" onclick="location.href='baizhan.html'">
            <div class="card-icon">⚔️</div>
            <h2>百战燕云</h2>
            <div class="sub">· Roguelike 地牢 ·</div>
            <div class="desc">
                永久死亡 · 随机武学 · 百层幽冥<br>
                每一次都是全新的死斗。
            </div>
            <span class="card-btn">入幽冥渊 →</span>
        </div>
    </div>
    <div class="footer-note">
        🎋 燕云十六州 · 风云再起 | 选择你的江湖路
    </div>
</div>
</body>
</html>
